# ─────────────────────────────────────────────────────────────────────────────
# AgentWorm LLM configuration
#
# provider options:
#   openai            → OpenAI API (GPT-4o, o3, etc.)
#   anthropic         → Anthropic API (Claude Sonnet, Opus, etc.)
#   openai_compatible → Any OpenAI-compatible endpoint (DO Inference, Ollama…)
#   openrouter        → OpenRouter multi-provider gateway (model sweep benchmarking)
#
# To switch provider: change `provider` and the matching block below.
# To override model at runtime without rebuild:  LLM_MODEL=<name> docker compose up
# ─────────────────────────────────────────────────────────────────────────────

llm:

  # ── Active provider ─────────────────────────────────────────────────────────
  provider: openai

  # ── OpenAI ──────────────────────────────────────────────────────────────────
  # pip package: langchain-openai (already in requirements.txt)
  # API key env: OPENAI_API_KEY  (set in .env)
  model: gpt-5.4
  api_key_env: OPENAI_API_KEY
  max_tokens: 4096

  # ── Anthropic Claude ────────────────────────────────────────────────────────
  # Uncomment this block and set provider: anthropic to use Claude.
  # pip package: langchain-anthropic (in requirements.txt)
  # API key env: ANTHROPIC_API_KEY  (set in .env)
  #
  # provider: anthropic
  # model: claude-sonnet-4-6
  # api_key_env: ANTHROPIC_API_KEY
  # max_tokens: 4096

  # ── DigitalOcean Inference (OpenAI-compatible) ───────────────────────────────
  # Uncomment this block and set provider: openai_compatible to use DO Inference.
  # pip package: langchain-openai (already in requirements.txt)
  # API key env: DIGITALOCEAN_TOKEN  (set in .env)
  #
  # provider: openai_compatible
  # model: anthropic-claude-haiku-4.5
  # api_base: https://inference.do-ai.run/v1
  # api_key_env: DIGITALOCEAN_TOKEN
  # max_tokens: 4096

  # ── Ollama (local, OpenAI-compatible) ───────────────────────────────────────
  # provider: openai_compatible
  # model: llama3.1:8b
  # api_base: http://ollama:11434/v1
  # api_key_env: ""            # Ollama needs no key
  # max_tokens: 4096

  # ── OpenRouter (multi-provider, benchmark sweeps) ───────────────────────────
  # pip package: langchain-openrouter (in requirements.txt)
  # API key env: OPENROUTER_API_KEY  (set in .env)
  # Model IDs - see https://openrouter.ai/models for available models and their provider mappings.
  # provider: openrouter
  # model: z-ai/glm-4.5-air
  # api_key_env: OPENROUTER_API_KEY
  # max_tokens: 4096

run:
  log_dir: /runs
  max_hosts: 3
  # Max LangGraph node executions per agent activation.
  # Each agent reasoning step + each tool call counts as 1.
  # 50 ≈ ~16 tool-use cycles before the turn is forcibly terminated.
  max_recursion: 60
